  </defs>

  <rect width="760" height="410" rx="12" fill="#0D1117"/>
  <rect x="0.75" y="0.75" width="758.5" height="408.5" rx="11" fill="none" stroke="#161B22" stroke-width="1.5"/>

  <!-- C -->
  <text x="22" y="48" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="15" fill="#E6EDF3">▸ C</text>
  <rect x="190" y="38" width="520" height="14" rx="7" fill="#161B22"/>
  <rect x="190" y="38" width="0" height="14" rx="7" fill="url(#barGrad)" filter="url(#barGlow)">
    <animate attributeName="width" from="0" to="416" dur="1.1s" fill="freeze" begin="0s"/>
  </rect>
  <text x="730" y="49" text-anchor="end" font-family="'SF Mono','Fira Code',Consolas,monospace" font-size="12" fill="#8B949E">80%</text>

